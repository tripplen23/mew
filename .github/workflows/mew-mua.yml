name: Mew Agent Mua

# Manual trigger only. Binh clicks "Run workflow" from the Actions tab
# to have mew-agent-bot[bot] dance a tiny commit onto a branch + open a PR.
# Author of the resulting commit is the Mew GitHub App (avatar = Mew),
# so the PR and Contributors tab show up correctly.

on:
  workflow_dispatch:
    inputs:
      emoji:
        description: "Emoji to stamp on the dance commit"
        required: false
        default: "🦊"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  mua:
    name: Mew dances
    runs-on: ubuntu-latest
    steps:
      - name: Generate Mew installation token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.MEW_APP_ID }}
          private-key: ${{ secrets.MEW_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp a tiny commit as mew-agent-bot[bot]
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          EMOJI: ${{ inputs.emoji }}
          BRANCH: mew/mua-${{ github.run_id }}
        run: |
          git switch -c "$BRANCH" origin/master
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "# Mew Agent dance log"
            echo
            echo "- ${ts} ${EMOJI}  waved from workflow run ${{ github.run_id }}"
          } >> MEW_BOT.md
          git add MEW_BOT.md
          git -c user.name='mew-agent-bot[bot]' \
              -c user.email='4332496+mew-agent-bot[bot]@users.noreply.github.com' \
              commit -m "${EMOJI} mua thu (run ${{ github.run_id }})"

      - name: Push branch
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          BRANCH: mew/mua-${{ github.run_id }}
        run: git push -u origin "$BRANCH"

      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          BRANCH: mew/mua-${{ github.run_id }}
        run: |
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "🦊 Mew mua thu (run ${{ github.run_id }})" \
            --body "Auto-generated by the \`Mew Agent Mua\` workflow.

          - Run: \`${{ github.run_id }}\`
          - Commit author: \`mew-agent-bot[bot]\` (avatar = Mew)
          - Marker: appended one line to \`MEW_BOT.md\`
          "
