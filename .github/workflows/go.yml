name: Go

on:
  push:
    branches: [ "master" ]
    paths:
      - "mew-mcp/**"
      - ".github/workflows/go.yml"
  pull_request:
    branches: [ "master" ]
    paths:
      - "mew-mcp/**"
      - ".github/workflows/go.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
    - name: Download deps
      working-directory: mew-mcp
      run: go mod download
    - name: Test
      working-directory: mew-mcp
      run: go test -v ./...
    - name: Build
      working-directory: mew-mcp
      run: go build ./cmd/mew-mcp
    - name: Vet
      working-directory: mew-mcp
      run: go vet ./...
