services:
  db:
    image: postgres:17-alpine
    container_name: mewcode-postgres
    environment:
      POSTGRES_USER: mewcode
      POSTGRES_PASSWORD: mewcode
      POSTGRES_DB: mewcode
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mewcode -d mewcode"]
      interval: 5s
      timeout: 3s
      retries: 10
